; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-n16r8]
platform = espressif32 @ 6.5.0
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
board_upload.flash_size = 16MB
board_build.filesystem = littlefs
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
lib_ldf_mode = deep+
build_flags = 
	-DBOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DTINY_GSM_MODEM_A7672X
	-DTINY_GSM_USE_GPRS=true
	-DTINY_GSM_USE_WIFI=false
	-IC:/Users/lawng/.platformio/packages/framework-arduinoespressif32/libraries/LittleFS/src
	-IC:/Users/lawng/.platformio/packages/framework-arduinoespressif32/libraries/WiFi/src
lib_deps = 
	LittleFS
	vshymanskyy/TinyGSM@^0.12.0
	knolleary/PubSubClient@^2.8
	4-20ma/ModbusMaster@^2.0.1
	adafruit/Adafruit SHT31 Library@^2.2.2
	mathieucarbou/StreamDebugger@^2.1.2
	SPI
	Wire
	bblanchon/ArduinoJson@^7.4.2
	mobizt/Firebase ESP32 Client@^4.4.17

